# ─────────────────────────────────────────────────────────────────────────────
# NZF Community Need Map — Netlify Configuration
# ─────────────────────────────────────────────────────────────────────────────
[build]
  publish   = "public"
  functions = "netlify/functions"
  # No build command needed. The postcode data file is committed to the repo.
  # Run `node scripts/build-postcodes.js` once locally to generate it (see README).
[build.environment]
  NODE_VERSION = "20"

# ── Global functions config: use Node 20 runtime for all functions ────────────
[functions]
  node_bundler = "esbuild"

# ── Daily refresh is now handled by GitHub Actions (/.github/workflows/refresh-map-data.yml)
#    Runs at 7:00 AM AEST (21:00 UTC) — after Zoho Analytics syncs at ~5 AM AEST.
#    The schedule has been removed from here to avoid conflicts.
[functions."refresh-data-background"]
  timeout = 900

# ── Security headers for all responses ───────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://*.cartocdn.com; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'"

# ── Long-lived cache for static assets ───────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Clean URL routing: /api/* → /.netlify/functions/* ─────────────────────────
[[redirects]]
  from   = "/api/:func"
  to     = "/.netlify/functions/:func"
  status = 200
